<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NetCafe - Khách hàng</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#252a3a;--accent:#4f8eff;--accent2:#7c5cfc;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1a2340 0%,#0d0f14 70%);}
.login-box{width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px;}
.login-logo h1{font-size:22px;font-weight:700;}
.login-logo p{color:var(--muted);font-size:13px;margin-top:6px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s;}
.form-group input:focus{border-color:var(--accent);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:var(--sans);}
.btn-login:hover{opacity:.9;}

/* APP */
#app{display:none;min-height:100vh;background:var(--bg);}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.header-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;}
.header-logo .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.header-user{display:flex;align-items:center;gap:10px;}
.header-user .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.header-user .name{font-size:13px;font-weight:600;}
.btn-logout{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);}

.container{max-width:800px;margin:0 auto;padding:24px;}

/* WALLET CARD */
.wallet-card{background:linear-gradient(135deg,#1a2a4a,#1a1a3a);border:1px solid rgba(79,142,255,.3);border-radius:20px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden;}
.wallet-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(79,142,255,.15),transparent);border-radius:50%;}
.wallet-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.wallet-balance{font-size:42px;font-weight:700;font-family:var(--mono);color:#fff;margin-bottom:4px;}
.wallet-balance span{font-size:24px;opacity:.7;}
.wallet-meta{display:flex;align-items:center;gap:12px;margin-top:14px;}
.tier-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tier-vip{background:rgba(124,92,252,.2);border:1px solid rgba(124,92,252,.4);color:#a78bfa;}
.tier-normal{background:rgba(79,142,255,.15);border:1px solid rgba(79,142,255,.3);color:var(--accent);}
.total-topup{font-size:12px;color:rgba(255,255,255,.4);}

/* SESSION CARD */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.session-card.active{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.03);}
.session-card.inactive{border-color:var(--border);}
.session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.session-title{font-size:15px;font-weight:700;}
.session-status-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.session-status-badge.active{background:rgba(34,197,94,.15);color:var(--green);}
.session-status-badge.active::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
.session-status-badge.inactive{background:var(--surface2);color:var(--muted);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.session-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.session-stat{text-align:center;background:var(--surface2);border-radius:12px;padding:16px;}
.session-stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.session-stat .value{font-size:20px;font-weight:700;font-family:var(--mono);}
.session-stat .value.green{color:var(--green);}
.session-stat .value.yellow{color:var(--yellow);}
.session-stat .value.accent{color:var(--accent);}
.no-session{text-align:center;padding:32px;color:var(--muted);}
.no-session .icon{font-size:40px;margin-bottom:10px;}

/* HISTORY */
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
.history-list{display:flex;flex-direction:column;gap:10px;}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;}
.history-item .time{font-size:12px;color:var(--muted);}
.history-item .cost{font-family:var(--mono);font-weight:700;color:var(--accent);}
.history-item .duration{font-size:12px;color:var(--muted);font-family:var(--mono);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge::before{content:'●';font-size:8px;}
.badge.green{background:rgba(34,197,94,.12);color:var(--green);}
.badge.blue{background:rgba(79,142,255,.12);color:var(--accent);}

.refresh-note{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;}
.refresh-note span{color:var(--accent);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🖥️</div>
      <h1>NetCafe</h1>
      <p>Đăng nhập tài khoản của bạn</p>
    </div>
    <div class="form-group"><label>Tên đăng nhập</label><input type="text" id="login-username" placeholder="username của bạn" /></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="login-password" placeholder="••••••••" /></div>
    <button class="btn-login" onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo"><div class="logo-icon">🖥️</div> NetCafe</div>
    <div class="header-user">
      <div class="avatar" id="h-avatar">K</div>
      <div class="name" id="h-name">Khách</div>
      <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </div>
  </div>

  <div class="container">
    <!-- WALLET -->
    <div class="wallet-card">
      <div class="wallet-label">Số dư tài khoản</div>
      <div class="wallet-balance" id="w-balance"><span>...</span></div>
      <div class="wallet-meta">
        <div id="w-tier"></div>
        <div class="total-topup" id="w-topup"></div>
      </div>
    </div>

    <!-- ACTIVE SESSION -->
    <div id="session-section"></div>

    <!-- HISTORY -->
    <div class="section-title">Lịch sử phiên chơi</div>
    <div class="history-list" id="history-list">
      <div style="text-align:center;padding:24px;color:var(--muted)">Đang tải...</div>
    </div>

    <div class="refresh-note">Tự động cập nhật mỗi <span>30 giây</span></div>
  </div>
</div>

<script>
const API = {
  auth:    'http://localhost:5001/api',
  wallet:  'http://localhost:5002/api',
  session: 'http://localhost:5004/api',
};
let token = localStorage.getItem('c_token') || '';
let currentUser = JSON.parse(localStorage.getItem('c_user') || 'null');
let refreshInterval = null;
let sessionTimer = null;
let activeSession = null;

async function http(service, path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API[service] + path, opts);
  const text = await res.text();
  const data = text ? JSON.parse(text) : null;
  if (!res.ok) throw new Error(typeof data === 'string' ? data : JSON.stringify(data));
  return data;
}

function fmt(n) { return Number(n).toLocaleString('vi-VN') + 'đ'; }

function fmtDuration(startTime) {
  const start = new Date(startTime);
  const now = new Date();
  const diff = Math.floor((now - start) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function fmtTime(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
}

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return alert('Nhập đủ thông tin');
  try {
    const data = await http('auth', '/auth/login', 'POST', { username, password });
    if (data.user.role !== 'Customer') return alert('Trang này chỉ dành cho khách hàng');
    token = data.accessToken;
    currentUser = data.user;
    localStorage.setItem('c_token', token);
    localStorage.setItem('c_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) { alert('Sai tên đăng nhập hoặc mật khẩu'); }
}

function logout() {
  clearInterval(refreshInterval);
  clearInterval(sessionTimer);
  token = ''; currentUser = null;
  localStorage.removeItem('c_token'); localStorage.removeItem('c_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('h-name').textContent = currentUser.fullName;
  document.getElementById('h-avatar').textContent = currentUser.fullName[0].toUpperCase();
  loadAll();
  refreshInterval = setInterval(loadAll, 30000);
}

async function loadAll() {
  await Promise.allSettled([loadWallet(), loadSession(), loadHistory()]);
}

async function loadWallet() {
  try {
    const wallet = await http('wallet', `/wallet/${currentUser.id}`);
    document.getElementById('w-balance').innerHTML = fmt(wallet.balance);
    document.getElementById('w-tier').innerHTML = wallet.memberTier === 'VIP'
      ? '<div class="tier-badge tier-vip">⭐ VIP · Giảm 5%</div>'
      : '<div class="tier-badge tier-normal">💻 Normal</div>';
    document.getElementById('w-topup').textContent = `Tổng nạp: ${fmt(wallet.totalTopup)}`;
  } catch(e) {}
}

async function loadSession() {
  try {
    const session = await http('session', `/sessions/active/${currentUser.id}`);
    activeSession = session;
    renderActiveSession(session);
  } catch(e) {
    activeSession = null;
    renderNoSession();
  }
}

function renderActiveSession(session) {
  clearInterval(sessionTimer);
  const el = document.getElementById('session-section');
  el.innerHTML = `
    <div class="session-card active" style="margin-bottom:20px">
      <div class="session-header">
        <div class="session-title">🖥️ Đang chơi</div>
        <div class="session-status-badge active">Đang hoạt động</div>
      </div>
      <div class="session-grid">
        <div class="session-stat">
          <div class="label">Thời gian</div>
          <div class="value yellow" id="s-duration">0s</div>
        </div>
        <div class="session-stat">
          <div class="label">Đã tiêu</div>
          <div class="value accent" id="s-cost">${fmt(session.totalCost)}</div>
        </div>
        <div class="session-stat">
          <div class="label">Giá/giờ</div>
          <div class="value">${fmt(session.pricePerHour)}</div>
        </div>
      </div>
      <div style="margin-top:14px;font-size:12px;color:var(--muted);text-align:center">
        Bắt đầu lúc ${fmtTime(session.startTime)} · 
        ${session.discount > 0 ? `<span style="color:var(--green)">VIP giảm ${(session.discount*100).toFixed(0)}%</span>` : 'Giá thường'}
      </div>
    </div>`;

  // Timer realtime
  sessionTimer = setInterval(() => {
    const durEl = document.getElementById('s-duration');
    if (durEl && activeSession) durEl.textContent = fmtDuration(activeSession.startTime);
  }, 1000);
}

function renderNoSession() {
  clearInterval(sessionTimer);
  document.getElementById('session-section').innerHTML = `
    <div class="session-card inactive" style="margin-bottom:20px">
      <div class="no-session">
        <div class="icon">💤</div>
        <div style="font-weight:600;margin-bottom:4px">Chưa có phiên chơi</div>
        <div style="font-size:12px">Liên hệ nhân viên để mở máy</div>
      </div>
    </div>`;
}

async function loadHistory() {
  try {
    const sessions = await http('session', '/sessions/history');
    const mySessions = sessions.filter(s => s.userId === currentUser.id);
    const list = document.getElementById('history-list');
    if (!mySessions.length) {
      list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted)">Chưa có lịch sử phiên nào</div>';
      return;
    }
    list.innerHTML = mySessions.map(s => `
      <div class="history-item">
        <div>
          <div style="font-weight:600;margin-bottom:4px">${fmtTime(s.startTime)} → ${fmtTime(s.endTime)}</div>
          <div class="time">${s.endTime ? fmtDuration2(s.startTime, s.endTime) : fmtDuration(s.startTime)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="cost">${fmt(s.totalCost)}</div>
          <span class="badge ${s.status==='Active'?'green':'blue'}">${s.status==='Active'?'Đang chơi':'Đã đóng'}</span>
        </div>
      </div>`).join('');
  } catch(e) {}
}

function fmtDuration2(start, end) {
  const diff = Math.floor((new Date(end) - new Date(start)) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

if (token && currentUser) showApp();
else document.getElementById('login-page').style.display = 'flex';
</script>
</body>
</html>
